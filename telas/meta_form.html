<!DOCTYPE html>
<!-- ═══════════════════════════════════════════════════════════
     meta_form.html — Criar / Editar meta de economia
     Django: {% extends "base.html" %}
     Django: {% block title %}{% if form.instance.pk %}Editar{% else %}Nova{% endif %} Meta — ACashController{% endblock %}
     ═══════════════════════════════════════════════════════════ -->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Meta — ACashController</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <!-- Django: <link rel="stylesheet" href="{% static 'css/styles.css' %}"> -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── NAVBAR ─────────────────────────────────────────────── -->
  <nav class="navbar">
    <a href="dashboard.html" class="navbar-brand">
      <span class="logo-mark">AC</span>
      ACashController
    </a>
    <ul class="navbar-nav">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="transacoes.html">Transações</a></li>
      <li><a href="categorias.html">Categorias</a></li>
      <li><a href="metas.html" class="active">Metas</a></li>
    </ul>
    <div class="navbar-end">
      <div class="avatar">U</div><!-- Django: {{ user.username|first|upper }} -->
      <span class="navbar-username">usuario</span><!-- Django: {{ user.username }} -->
      <a href="login.html" class="navbar-sair">Sair</a><!-- Django: {% url 'logout' %} -->
    </div>
  </nav>

  <!-- Django: {% block content %} -->
  <main class="page">
    <div style="max-width: 520px;">

      <!-- Cabeçalho -->
      <div class="page-header">
        <!-- Django: <h1 class="page-title">{% if form.instance.pk %}Editar Meta{% else %}Nova Meta{% endif %}</h1> -->
        <h1 class="page-title">Nova Meta</h1>
        <a href="metas.html" class="btn btn-outline btn-inline btn-sm">← Voltar</a>
      </div>

      <div class="card">

        <!-- ── Área de erro de validação ───────────────────── -->
        <!-- Django: {% if form.errors %} -->
        <div class="alert-inline" id="erroValidacao">
          <span>⚠</span>
          <span>Corrija os erros abaixo antes de salvar. <em style="font-weight:400;">(visível apenas quando houver erro)</em></span>
        </div>
        <!-- Django: {% endif %} -->

        <!-- Django: <form method="post" action="{% if form.instance.pk %}{% url 'meta_editar' form.instance.pk %}{% else %}{% url 'meta_nova' %}{% endif %}"> -->
        <form method="post" action="#">
          <!-- Django: {% csrf_token %} -->
          <!-- Django: {% if form.instance.pk %}<input type="hidden" name="id" value="{{ form.instance.pk }}">{% endif %} -->

          <!-- Nome -->
          <div class="form-group">
            <label class="form-label" for="id_nome">Nome <span style="color: var(--red);">*</span></label>
            <!-- Django: {{ form.nome }} -->
            <input
              class="form-control"
              type="text"
              id="id_nome"
              name="nome"
              placeholder="Ex.: Fundo de Emergência, Viagem..."
              maxlength="120"
              required
            >
            <!-- Django: {% if form.nome.errors %}<span class="form-hint" style="color:var(--red);">{{ form.nome.errors|join:", " }}</span>{% endif %} -->
          </div>

          <!-- Valor Alvo + Valor Atual (duas colunas) -->
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="id_valor_alvo">Valor Alvo (R$) <span style="color: var(--red);">*</span></label>
              <!-- Django: {{ form.valor_alvo }} -->
              <input
                class="form-control"
                type="number"
                id="id_valor_alvo"
                name="valor_alvo"
                placeholder="20000.00"
                min="0"
                step="0.01"
                required
              >
              <!-- Django: {% if form.valor_alvo.errors %}<span class="form-hint" style="color:var(--red);">{{ form.valor_alvo.errors|join:", " }}</span>{% endif %} -->
            </div>

            <div class="form-group">
              <label class="form-label" for="id_valor_atual">Valor Atual (R$)</label>
              <!-- Django: {{ form.valor_atual }} -->
              <input
                class="form-control"
                type="number"
                id="id_valor_atual"
                name="valor_atual"
                placeholder="0.00"
                min="0"
                step="0.01"
                value="0"
              >
              <span class="form-hint">Quanto você já juntou.</span>
              <!-- Django: {% if form.valor_atual.errors %}<span class="form-hint" style="color:var(--red);">{{ form.valor_atual.errors|join:", " }}</span>{% endif %} -->
            </div>
          </div>

          <!-- Preview de progresso ao vivo -->
          <div class="form-group" id="progressPreview" style="display: none;">
            <label class="form-label">Progresso atual</label>
            <div class="goal-track" style="height: 10px; margin-bottom: 6px;">
              <div class="goal-fill" id="progressFill" style="width: 0%;"></div>
            </div>
            <span class="goal-pct" id="progressLabel" style="font-size: .8rem;">0% concluído</span>
          </div>

          <!-- Prazo -->
          <div class="form-group">
            <label class="form-label" for="id_prazo">
              Prazo <span style="font-weight: 400; color: var(--text-light);">(opcional)</span>
            </label>
            <!-- Django: {{ form.prazo }} -->
            <input
              class="form-control"
              type="date"
              id="id_prazo"
              name="prazo"
            >
            <!-- Django: {% if form.prazo.errors %}<span class="form-hint" style="color:var(--red);">{{ form.prazo.errors|join:", " }}</span>{% endif %} -->
          </div>

          <!-- Ações -->
          <div class="form-actions" style="margin-top: 8px;">
            <button type="submit" class="btn btn-primary">
              <!-- Django: {% if form.instance.pk %}Salvar Alterações{% else %}Salvar Meta{% endif %} -->
              Salvar Meta
            </button>
            <a href="metas.html" class="btn btn-outline">Cancelar</a>
          </div>

        </form>
      </div>
    </div>
  </main>
  <!-- Django: {% endblock %} -->

  <!-- ── JS mínimo: preview de progresso ao vivo ────────────── -->
  <!-- Django: {% block extra_js %} -->
  <script>
    (function () {
      const inputAlvo   = document.getElementById('id_valor_alvo');
      const inputAtual  = document.getElementById('id_valor_atual');
      const preview     = document.getElementById('progressPreview');
      const fill        = document.getElementById('progressFill');
      const label       = document.getElementById('progressLabel');

      function atualizar() {
        const alvo  = parseFloat(inputAlvo.value)  || 0;
        const atual = parseFloat(inputAtual.value) || 0;
        if (alvo <= 0) { preview.style.display = 'none'; return; }
        const pct = Math.min(Math.round((atual / alvo) * 100), 100);
        preview.style.display = 'block';
        fill.style.width      = pct + '%';
        label.textContent     = pct + '% concluído';
      }

      inputAlvo.addEventListener('input',  atualizar);
      inputAtual.addEventListener('input', atualizar);
    })();
  </script>
  <!-- Django: {% endblock %} -->

</body>
</html>
