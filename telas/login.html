<!DOCTYPE html>
<!-- ═══════════════════════════════════════════════
     login.html — Tela de login
     Django: {% extends "base.html" %}  (sem navbar)
     ═══════════════════════════════════════════════ -->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ACashController</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <!-- Django: <link rel="stylesheet" href="{% static 'css/styles.css' %}"> -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Django: {% block content %} -->
<div class="auth-page">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-mark">AC</div>
      <div class="auth-logo-title">ACashController</div>
      <div class="auth-logo-sub">Faça login para continuar</div>
    </div>

    <!-- Django: {% if messages %} -->
    <!-- Django: {% for message in messages %} -->
    <!-- Django: <div class="alert alert-{{ message.tags }}" style="margin-bottom:16px">{{ message }}</div> -->
    <!-- Django: {% endfor %} -->
    <!-- Django: {% endif %} -->

    <!-- Django: <form method="post" action="{% url 'login' %}"> -->
    <form method="post" action="#">
      <!-- Django: {% csrf_token %} -->

      <div class="form-group">
        <label class="form-label" for="id_username">Usuário</label>
        <!-- Django: {{ form.username }} -->
        <input
          class="form-control"
          type="text"
          id="id_username"
          name="username"
          placeholder="Seu usuário"
          autocomplete="username"
          required
        >
        <!-- Django: {{ form.username.errors }} -->
      </div>

      <div class="form-group">
        <label class="form-label" for="id_password">Senha</label>
        <!-- Django: {{ form.password }} -->
        <input
          class="form-control"
          type="password"
          id="id_password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        >
        <!-- Django: {{ form.password.errors }} -->
      </div>

      <button type="submit" class="btn btn-primary" style="margin-top: 8px;">
        Entrar
      </button>
    </form>

    <div class="auth-footer">
      Não tem conta?
      <!-- Django: <a href="{% url 'cadastro' %}">Cadastre-se</a> -->
      <a href="cadastro.html">Cadastre-se</a>
    </div>

  </div>
</div>
<!-- Django: {% endblock %} -->

</body>
</html>
