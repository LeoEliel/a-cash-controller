<!DOCTYPE html>
<!-- ═══════════════════════════════════════════════
     cadastro.html — Tela de cadastro
     Django: {% extends "base.html" %}  (sem navbar)
     ═══════════════════════════════════════════════ -->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro — ACashController</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <!-- Django: <link rel="stylesheet" href="{% static 'css/styles.css' %}"> -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Django: {% block content %} -->
<div class="auth-page">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-mark">AC</div>
      <div class="auth-logo-title">ACashController</div>
      <div class="auth-logo-sub">Criar nova conta</div>
    </div>

    <!-- Django: {% if messages %} -->
    <!-- Django: {% for message in messages %} -->
    <!-- Django: <div class="alert alert-{{ message.tags }}" style="margin-bottom:16px">{{ message }}</div> -->
    <!-- Django: {% endfor %} -->
    <!-- Django: {% endif %} -->

    <!-- Django: <form method="post" action="{% url 'cadastro' %}"> -->
    <form method="post" action="#">
      <!-- Django: {% csrf_token %} -->

      <div class="form-group">
        <label class="form-label" for="id_username">Usuário</label>
        <!-- Django: {{ form.username }} -->
        <input
          class="form-control"
          type="text"
          id="id_username"
          name="username"
          placeholder="Escolha um usuário"
          autocomplete="username"
          required
        >
        <!-- Django: {{ form.username.errors }} -->
      </div>

      <div class="form-group">
        <label class="form-label" for="id_email">E-mail</label>
        <!-- Django: {{ form.email }} -->
        <input
          class="form-control"
          type="email"
          id="id_email"
          name="email"
          placeholder="voce@email.com"
          autocomplete="email"
          required
        >
        <!-- Django: {{ form.email.errors }} -->
      </div>

      <div class="form-group">
        <label class="form-label" for="id_password1">Senha</label>
        <!-- Django: {{ form.password1 }} -->
        <input
          class="form-control"
          type="password"
          id="id_password1"
          name="password1"
          placeholder="Mínimo 8 caracteres"
          autocomplete="new-password"
          required
        >
        <!-- Django: {{ form.password1.errors }} -->
      </div>

      <div class="form-group">
        <label class="form-label" for="id_password2">Confirmar Senha</label>
        <!-- Django: {{ form.password2 }} -->
        <input
          class="form-control"
          type="password"
          id="id_password2"
          name="password2"
          placeholder="Repita a senha"
          autocomplete="new-password"
          required
        >
        <!-- Django: {{ form.password2.errors }} -->
      </div>

      <button type="submit" class="btn btn-primary" style="margin-top: 8px;">
        Criar Conta
      </button>
    </form>

    <div class="auth-footer">
      Já tem conta?
      <!-- Django: <a href="{% url 'login' %}">Entrar</a> -->
      <a href="login.html">Entrar</a>
    </div>

  </div>
</div>
<!-- Django: {% endblock %} -->

</body>
</html>
